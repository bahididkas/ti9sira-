[build]
  command = "echo 'Static site - no build needed'"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/downloads/*"
  to = "/.netlify/functions/api"
  status = 200
